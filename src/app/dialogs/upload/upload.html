<div class="container dialog-container">
    <button mat-icon-button mat-dialog-close class="dialog-close-btn">
        <mat-icon>close</mat-icon>
    </button>
    <h2 mat-dialog-title>Caricamente imagine per veicolo {{veicolo()?.marca.nome}} {{veicolo()?.modello}}</h2>
    <mat-dialog-content>
        <div class="full-row image-row">
          
            <div class="image-left">
                <button mat-raised-button color="primary" type="button"
                    (click)="fileInput.click()">
                    <mat-icon>upload</mat-icon>
                    Scegli immagine
                </button>

                <span class="file-name">{{ fileName }}</span>

                <input #fileInput type="file" accept="image/*" style="display: none" (change)="onFileSelected($event)">
            </div>

            <!-- Destra: accordion con anteprima -->
            <div class="image-right">
                <mat-accordion>
                    <mat-expansion-panel [expanded]="true">
                        <mat-expansion-panel-header>
                            <mat-panel-title>
                                <span>Immagine</span>
                            </mat-panel-title>
                        </mat-expansion-panel-header>

                        @if (imageUrl()) {
                        <div>
                            <img [src]="imageUrl()" alt="Uploaded" style="max-width: 300px;">
                        </div>
                        }
                    </mat-expansion-panel>
                </mat-accordion>
            </div>
        </div>

        <div class="msg-error full-row">
            <span style="color:red">{{ msg() }}</span>
        </div>

    </mat-dialog-content>
</div>
